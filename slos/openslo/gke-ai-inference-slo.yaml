apiVersion: "openslo/v1"
kind: "SLO"
metadata:
  name: "gke-ai-inference-availability"
  displayName: "GKE AI inference availability and latency"
  labels:
    service: "toy-ai-inference-api"
    namespace: "ai-observability-demo"
    team: "sre-platform"
    owner: "platform-sre"
  annotations:
    description: "Machine-readable SLO contract for the GKE AI Inference Reliability Lab."
    profile: "gke-ai-inference-reliability-lab-v1"
spec:
  service: "toy-ai-inference-api"
  indicator:
    metadata:
      name: "inference-request-quality"
    spec:
      ratioMetric:
        counter: true
        good:
          metricSource:
            type: "prometheus"
            query: "sum(rate(http_server_duration_seconds_count{k8s_namespace_name=\"ai-observability-demo\",service_name=\"toy-ai-inference-api\"}[5m])) - (sum(rate(http_server_duration_seconds_count{k8s_namespace_name=\"ai-observability-demo\",service_name=\"toy-ai-inference-api\",http_response_status_code=~\"5..\"}[5m])))"
        total:
          metricSource:
            type: "prometheus"
            query: "sum(rate(http_server_duration_seconds_count{k8s_namespace_name=\"ai-observability-demo\",service_name=\"toy-ai-inference-api\"}[5m]))"
  latencyGuardrails:
    -
      name: "baseline-p95-latency"
      scenario: "baseline"
      metricSource:
        type: "prometheus"
        query: "histogram_quantile(0.95, sum by (le) (rate(http_server_duration_seconds_bucket{k8s_namespace_name=\"ai-observability-demo\",service_name=\"toy-ai-inference-api\"}[5m]))) > 0.1"
    -
      name: "rollout-p95-latency"
      scenario: "rollout_regression"
      metricSource:
        type: "prometheus"
        query: "histogram_quantile(0.95, sum by (le) (rate(http_server_duration_seconds_bucket{k8s_namespace_name=\"ai-observability-demo\",service_name=\"toy-ai-inference-api\",service_version=\"v2\"}[5m]))) > 0.3"
  objective:
    displayName: "99.5% of inference requests should remain available and inside the configured p95 latency envelope."
    target: 99.5
    timeWindow:
      -
        duration: "30d"
        isRolling: true
    budgetingMethod: "Occurrences"
  scenarios:
    - "baseline"
    - "cache_miss_storm"
    - "dependency_timeout"
    - "rollout_regression"
    - "collector_queue_pressure"
  operationalLinks:
    alerting_rules: "docs/evidence/alerting-rules.md"
    grafana_dashboard: "docs/evidence/grafana-dashboard.md"
    release_readiness: "docs/evidence/release-readiness.md"
    runbooks: "docs/evidence/incident-runbooks.md"
  telemetryQuality:
    lossRatioQuery: "sum(rate(otelcol_exporter_send_failed_spans_total[5m])) / clamp_min(sum(rate(otelcol_exporter_sent_spans_total[5m])) + sum(rate(otelcol_exporter_send_failed_spans_total[5m])), 1)"
    evidence: "docs/evidence/collector-resilience.md"
