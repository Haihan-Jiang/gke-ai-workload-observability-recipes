apiVersion: apps/v1
kind: Deployment
metadata:
  name: toy-ai-inference-api
  namespace: ai-observability-demo
  labels:
    app.kubernetes.io/name: toy-ai-inference-api
    app.kubernetes.io/part-of: gke-ai-inference-reliability-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: toy-ai-inference-api
  template:
    metadata:
      labels:
        app: toy-ai-inference-api
        app.kubernetes.io/name: toy-ai-inference-api
        app.kubernetes.io/part-of: gke-ai-inference-reliability-lab
      annotations:
        instrumentation.opentelemetry.io/inject-python: telemetry/python-instrumentation
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: python:3.12-slim
          command: ["python", "-m", "http.server", "8080"]
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: toy-ai-inference-api
  namespace: ai-observability-demo
  labels:
    app.kubernetes.io/name: toy-ai-inference-api
    app.kubernetes.io/part-of: gke-ai-inference-reliability-lab
spec:
  selector:
    app: toy-ai-inference-api
  ports:
    - name: http
      port: 80
      targetPort: http
