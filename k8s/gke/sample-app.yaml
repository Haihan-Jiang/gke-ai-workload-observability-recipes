apiVersion: v1
kind: ServiceAccount
metadata:
  name: toy-ai-inference-api
  namespace: ai-observability-demo
  labels:
    app.kubernetes.io/name: toy-ai-inference-api
    app.kubernetes.io/part-of: gke-ai-inference-reliability-lab
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: toy-ai-inference-api
  namespace: ai-observability-demo
  labels:
    app.kubernetes.io/name: toy-ai-inference-api
    app.kubernetes.io/part-of: gke-ai-inference-reliability-lab
spec:
  replicas: 2
  selector:
    matchLabels:
      app: toy-ai-inference-api
  template:
    metadata:
      labels:
        app: toy-ai-inference-api
        app.kubernetes.io/name: toy-ai-inference-api
        app.kubernetes.io/part-of: gke-ai-inference-reliability-lab
      annotations:
        instrumentation.opentelemetry.io/inject-python: telemetry/python-instrumentation
    spec:
      serviceAccountName: toy-ai-inference-api
      automountServiceAccountToken: false
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: toy-ai-inference-api
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: toy-ai-inference-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: python:3.12-slim@sha256:090ba77e2958f6af52a5341f788b50b032dd4ca28377d2893dcf1ecbdfdfe203
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "http.server", "8080"]
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: toy-ai-inference-api
  namespace: ai-observability-demo
  labels:
    app.kubernetes.io/name: toy-ai-inference-api
    app.kubernetes.io/part-of: gke-ai-inference-reliability-lab
spec:
  selector:
    app: toy-ai-inference-api
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: toy-ai-inference-api
  namespace: ai-observability-demo
  labels:
    app.kubernetes.io/name: toy-ai-inference-api
    app.kubernetes.io/part-of: gke-ai-inference-reliability-lab
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: toy-ai-inference-api
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: toy-ai-inference-api
  namespace: ai-observability-demo
  labels:
    app.kubernetes.io/name: toy-ai-inference-api
    app.kubernetes.io/part-of: gke-ai-inference-reliability-lab
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: toy-ai-inference-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      selectPolicy: Max
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      selectPolicy: Min
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
