apiVersion: apps/v1
kind: Deployment
metadata:
  name: toy-ai-inference-api
  namespace: ai-observability-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: toy-ai-inference-api
  template:
    metadata:
      labels:
        app: toy-ai-inference-api
      annotations:
        instrumentation.opentelemetry.io/inject-python: telemetry/python-instrumentation
    spec:
      containers:
        - name: app
          image: python:3.12-slim
          command: ["python", "-m", "http.server", "8080"]
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: toy-ai-inference-api
  namespace: ai-observability-demo
spec:
  selector:
    app: toy-ai-inference-api
  ports:
    - name: http
      port: 80
      targetPort: http

