apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: telemetry
  annotations:
    iam.gke.io/gcp-service-account: otel-collector@gke-ai-inference-reliability.iam.gserviceaccount.com
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: gke-ai-inference-reliability-lab
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector-readonly
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: gke-ai-inference-reliability-lab
rules:
  - apiGroups: [""]
    resources: [events, namespaces, nodes, pods, services]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [daemonsets, deployments, replicasets, statefulsets]
    verbs: [get, list, watch]
  - apiGroups: [batch]
    resources: [jobs, cronjobs]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector-readonly
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: gke-ai-inference-reliability-lab
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector-readonly
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: telemetry
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: otel-collector-queue
  namespace: telemetry
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: gke-ai-inference-reliability-lab
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: telemetry
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: gke-ai-inference-reliability-lab
data:
  config.yaml: |
    extensions:
      file_storage:
        directory: /var/lib/otelcol/queue
      health_check:
        endpoint: 0.0.0.0:13133

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      k8s_cluster:
        auth_type: serviceAccount
      prometheus/internal:
        config:
          scrape_configs:
            - job_name: otel-collector-internal
              scrape_interval: 30s
              static_configs:
                - targets: ["127.0.0.1:8888"]

    processors:
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 25
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.deployment.name
            - k8s.node.name
      resource/gke:
        attributes:
          - key: cloud.provider
            value: gcp
            action: upsert
          - key: deployment.environment
            value: demo
            action: upsert
      tail_sampling:
        decision_wait: 10s
        num_traces: 50000
        expected_new_traces_per_sec: 120
        policies:
          - name: keep-error-traces
            type: status_code
            status_code:
              status_codes: [ERROR]
          - name: keep-dependency-timeouts
            type: string_attribute
            string_attribute:
              key: error.type
              values: [upstream_dependency]
          - name: keep-rollout-regressions
            type: string_attribute
            string_attribute:
              key: service.version
              values: [v2]
          - name: keep-collector-pressure
            type: string_attribute
            string_attribute:
              key: collector.queue.pressure
              values: [high]
          - name: baseline-probabilistic-sample
            type: probabilistic
            probabilistic:
              sampling_percentage: 2
      batch:

    exporters:
      debug:
        verbosity: basic
      otlphttp/upstream:
        endpoint: https://otel-gateway.example.com:4318
        sending_queue:
          enabled: true
          storage: file_storage
        retry_on_failure:
          enabled: true

    service:
      extensions: [file_storage, health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, resource/gke, tail_sampling, batch]
          exporters: [debug, otlphttp/upstream]
        metrics:
          receivers: [otlp, k8s_cluster, prometheus/internal]
          processors: [memory_limiter, k8sattributes, resource/gke, batch]
          exporters: [debug, otlphttp/upstream]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: telemetry
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: gke-ai-inference-reliability-lab
spec:
  replicas: 1
  minReadySeconds: 10
  progressDeadlineSeconds: 180
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
        app.kubernetes.io/name: otel-collector
        app.kubernetes.io/part-of: gke-ai-inference-reliability-lab
    spec:
      serviceAccountName: otel-collector
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 60
      priorityClassName: ai-telemetry-critical
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 70
              preference:
                matchExpressions:
                  - key: cloud.google.com/gke-nodepool
                    operator: In
                    values: ["telemetry-pool"]
            - weight: 30
              preference:
                matchExpressions:
                  - key: workload.haihan.dev/telemetry
                    operator: In
                    values: ["true"]
      tolerations:
        - key: workload.haihan.dev/telemetry
          operator: Equal
          value: "true"
          effect: NoSchedule
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.112.0@sha256:2203eea06554f892c765d6eff8069cdf64ae8d4516526d03cab4a70e82775495
          imagePullPolicy: IfNotPresent
          args: ["--config=/etc/otelcol/config.yaml"]
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: healthz
              containerPort: 13133
          readinessProbe:
            httpGet:
              path: /
              port: healthz
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: healthz
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
              readOnly: true
            - name: queue
              mountPath: /var/lib/otelcol/queue
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
        - name: queue
          persistentVolumeClaim:
            claimName: otel-collector-queue
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: telemetry
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: gke-ai-inference-reliability-lab
spec:
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: otel-collector
  namespace: telemetry
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: gke-ai-inference-reliability-lab
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: otel-collector
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-otlp-from-ai-workloads
  namespace: telemetry
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: gke-ai-inference-reliability-lab
spec:
  podSelector:
    matchLabels:
      app: otel-collector
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              observability.haihan.dev/role: workload
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
